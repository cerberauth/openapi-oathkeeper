# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=jcroql
version: 2

project_name: openapi-oathkeeper

before:
  hooks:
    - go mod tidy
    - go generate ./...

snapshot:
  version_template: "{{ incpatch .Version }}-next"

gomod:
  proxy: true

report_sizes: true

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

builds:
  - id: openapi-oathkeeper
    binary: openapi-oathkeeper
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
      - goos: darwin
        goarch: "386"
      - goos: darwin
        goarch: arm
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{ .CommitDate }}

universal_binaries:
  - id: openapi-oathkeeper-universal
    ids:
      - openapi-oathkeeper
    replace: true

checksum:
  name_template: "checksums.txt"

source:
  enabled: true

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    builds_info:
      group: root
      owner: root
      mtime: "{{ .CommitDate }}"
    files:
      - README.md
      - LICENSE

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    output: true
    artifacts: checksum
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - --yes

changelog:
  sort: asc
  use: github
  format: "{{ .SHA }}: {{ .Message }}{{ if .Logins }} ({{ .Logins | englishJoin }}){{ end }}"
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?(fix|refactor)(\(.+\))??!?:.+$'
      order: 1
    - title: "Other"
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore\(deps\): '
      - '^(build|ci): '
      - Merge pull request
      - Merge branch

milestones:
  - close: true

release:
  name_template: "v{{ .Version }}"

homebrew_casks:
  - name: openapi-oathkeeper
    description: &description "Generate Ory Oathkeeper access rules from an OpenAPI 3 contract."
    license: &license MIT
    homepage: &homepage https://github.com/cerberauth/openapi-oathkeeper
    repository:
      owner: &owner cerberauth
      name: homebrew-tap
      branch: &main main
    commit_author: &commit_author
      name: cerberauth-bot
      email: 268418261+cerberauth-bot@users.noreply.github.com

scoops:
  - name: openapi-oathkeeper
    description: *description
    homepage: *homepage
    license: *license
    repository:
      owner: *owner
      name: scoop-bucket
      branch: *main
    commit_author: *commit_author

nfpms:
  - file_name_template: "{{ .ConventionalFileName }}"
    package_name: openapi-oathkeeper
    vendor: CerberAuth
    homepage: *homepage
    maintainer: Emmanuel Gautier <emmanuel@cerberauth.com>
    description: *description
    license: *license
    bindir: /usr/bin
    section: utils
    formats:
      - apk
      - deb
      - rpm
      - termux.deb
      - archlinux

snapcrafts:
  - name_template: "{{ .ProjectName }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    title: OpenAPI to Ory Oathkeeper rules
    publish: true
    summary: *description
    description: "Automate generation of Ory Oathkeeper access rules from an OpenAPI 3 contract, saving time especially for larger projects with many endpoints or many services."
    license: *license
    confinement: classic
    grade: stable
    channel_templates:
      - edge
      - beta
      - candidate
      - stable

aurs:
  - name: openapi-oathkeeper-bin
    homepage: *homepage
    description: *description
    maintainers:
      - Emmanuel Gautier <emmanuel@cerberauth.com>
    license: *license
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: ssh://aur@aur.archlinux.org/openapi-oathkeeper-bin.git
    skip_upload: auto
    package: |-
      install -Dm755 "./openapi-oathkeeper" "${pkgdir}/usr/bin/openapi-oathkeeper"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/openapi-oathkeeper/LICENSE"

winget:
  - name: openapi-oathkeeper
    publisher: CerberAuth
    publisher_url: https://www.cerberauth.com
    license: *license
    license_url: https://github.com/cerberauth/openapi-oathkeeper/blob/main/LICENSE
    homepage: *homepage
    short_description: *description
    repository:
      owner: *owner
      name: winget-pkgs
      branch: "openapi-oathkeeper-{{.Version}}"

chocolateys:
  - name: openapi-oathkeeper
    title: OpenAPI Oathkeeper
    owners: CerberAuth
    authors: CerberAuth
    description: *description
    project_url: *homepage
    license_url: https://github.com/cerberauth/openapi-oathkeeper/blob/main/LICENSE
    copyright: CerberAuth
    tags: "openapi oathkeeper security ory"
    summary: *description
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"
    source_repo: https://push.chocolatey.org/
    skip_publish: false

dockers_v2:
  - id: openapi-oathkeeper-dockerhub
    dockerfile: .docker/Dockerfile-goreleaser
    images:
      - "cerberauth/openapi-oathkeeper"
    tags:
      - "{{ .Tag }}"
      - "v{{ .Major }}"
      - "v{{ .Major }}.{{ .Minor }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7

  - id: openapi-oathkeeper-ghcr
    dockerfile: .docker/Dockerfile-goreleaser
    images:
      - "ghcr.io/cerberauth/openapi-oathkeeper"
    tags:
      - "{{ .Tag }}"
      - "v{{ .Major }}"
      - "v{{ .Major }}.{{ .Minor }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7

docker_signs:
  - cmd: cosign
    artifacts: manifests
    output: true
    args:
      - "sign"
      - "${artifact}@${digest}"
      - "--yes"
